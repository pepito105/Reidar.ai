version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: radar_postgres
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_secret
      POSTGRES_DB: radar_db
    ports:
      - "5432:5432"
    volumes:
      - radar_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  radar_postgres_data:
